# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones


    # 1 Mappers concrets 
    App\Mapper\Users\Mapper:
        tags:
            - { name: 'app.csv_mapper', key: 'users' }

    App\Mapper\Company\Mapper:
        tags:
            - { name: 'app.csv_mapper', key: 'company' }

    # 2 Importer CSV reçoit le locator des mappers
    App\Import\Csv\Importer:
        arguments:
            - !tagged_locator { tag: 'app.csv_mapper', index_by: 'key' }

    # 3 Importers "nommés" pour la factory
    app.importer.csv.users:
        class: App\Import\Csv\Importer
        arguments:
            - '@App\Mapper\Contract\MapperFactory'   # <-- injecte la factory de mappers
        tags:
            - { name: 'app.importer', key: 'csv.users' }

    app.importer.csv.company:
        class: App\Import\Csv\Importer
        arguments:
            - '@App\Mapper\Contract\MapperFactory'   # <-- injecte la factory de mappers
        tags:
            - { name: 'app.importer', key: 'csv.company' }

    # 4 ImporterFactory 
    App\Import\Csv\ImporterFactory:
        arguments:
            - !tagged_locator { tag: 'app.importer', index_by: 'key' }

    # 5 Service concret pour la MapperFactory 
    App\Mapper\Users\MapperFactory:
        arguments:
            $locator: !service_locator
                users: '@App\Mapper\Users\Mapper'
                company: '@App\Mapper\Company\Mapper'

    # Alias pour l'interface de la MapperFactory
    App\Mapper\Contract\MapperFactory:
        alias: App\Mapper\Users\MapperFactory